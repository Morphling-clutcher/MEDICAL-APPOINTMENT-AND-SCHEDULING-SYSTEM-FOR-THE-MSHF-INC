{# Modal for adding/editing a schedule slot — non-extending partial #}
<div id="modal-overlay" class="fixed inset-0 bg-black/50 z-40 transition-opacity opacity-0" style="transition-duration: 300ms;" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
  <div class="fixed inset-0 z-40 overflow-y-auto flex items-end md:items-center justify-center">
    <div class="modal-panel w-full h-full md:h-auto md:w-full max-w-md md:mx-4 md:my-8 translate-y-full md:translate-y-0 transition-transform" style="transition-duration: 300ms;">
      <div class="bg-white h-full md:h-auto max-h-full rounded-t-2xl md:rounded-xl shadow-xl flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 flex-shrink-0">
          <h2 id="modal-title" class="text-lg font-bold text-gray-800">{{ action }} Schedule Slot</h2>
          <button type="button" onclick="closeModal()" aria-label="Close" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 text-2xl leading-none">&times;</button>
        </div>
        <!-- Content -->
        <form method="post" class="px-6 py-6 space-y-4 flex-1 overflow-y-auto">
          {% csrf_token %}
          {% for field in form %}
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
          </div>
          {% endfor %}
          {% if form.non_field_errors %}
          <p class="text-red-600 text-sm bg-red-50 p-3 rounded">{{ form.non_field_errors.0 }}</p>
          {% endif %}
          <div class="flex gap-3 pt-4">
            <button type="submit" class="flex-1 bg-emerald-700 text-white font-bold py-3 rounded-lg hover:bg-emerald-800 transition">
              Save
            </button>
            <button type="button" onclick="closeModal()" class="flex-1 border border-gray-300 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-50 transition">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
  #modal-overlay.open {
    opacity: 1 !important;
  }
  #modal-overlay.open .modal-panel {
    transform: translateY(0) !important;
  }
</style>
