{% extends "components/modal.html" %}
{% block modal_content %}
<p class="text-gray-500 text-sm mb-6">
  Current: Dr. {{ appointment.doctor.get_full_name }} — {{ appointment.appointment_date|date:"F j, Y" }} at {{ appointment.appointment_time|time:"g:i A" }}
</p>

<form method="post" class="space-y-4">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-semibold text-gray-700 mb-1">New Date</label>
    <input type="date" name="appointment_date" required
           min="{% now 'Y-m-d' %}"
           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block text-sm font-semibold text-gray-700 mb-1">New Time</label>
    <input type="time" name="appointment_time" required
           class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block text-sm font-semibold text-gray-700 mb-1">Reason for visit</label>
    <textarea name="reason" rows="3"
              class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{ appointment.reason }}</textarea>
  </div>
  <div class="flex gap-3 pt-2">
    <button type="submit" class="flex-1 bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition">
      Confirm Reschedule
    </button>
    <button type="button" onclick="closeModal()" class="flex-1 border border-gray-300 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-50 transition">
      Cancel
    </button>
  </div>
</form>
{% endblock %}
