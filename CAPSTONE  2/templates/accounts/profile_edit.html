{% extends "base.html" %}
{% block title %}Edit Profile — MSHFI{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Profile</h1>
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">First Name</label>
            <input type="text" name="first_name" value="{{ request.user.first_name }}"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Last Name</label>
            <input type="text" name="last_name" value="{{ request.user.last_name }}"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          {% for field in form %}
          <div class="{% if field.name == 'address' %}sm:col-span-2{% endif %}">
            <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
          </div>
          {% endfor %}
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="px-6 py-2.5 bg-blue-700 text-white font-semibold rounded-lg hover:bg-blue-800 transition text-sm">
            Save Changes
          </button>
          <a href="{% url 'accounts:profile_view' %}" class="px-6 py-2.5 border border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50 transition text-sm">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
