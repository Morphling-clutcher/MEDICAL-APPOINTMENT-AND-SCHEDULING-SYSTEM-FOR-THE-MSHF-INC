{% extends "base.html" %}
{% block title %}Sign In — MSHFI{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-600 flex items-center justify-center px-4 py-12">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-800 rounded-full flex items-center justify-center mx-auto mb-3">
        <span class="text-white font-bold text-2xl">M</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Sign In</h1>
      <p class="text-gray-500 text-sm mt-1">MSHFI Medical Appointment System</p>
    </div>

    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required autofocus
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
               placeholder="Enter your username" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
               placeholder="Enter your password" />
      </div>
      <button type="submit"
              class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg text-base transition">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      New patient?
      <a href="{% url 'accounts:register' %}" class="text-blue-700 font-semibold hover:underline">Create an account</a>
    </p>
    <p class="text-center mt-3">
      <a href="/" class="text-sm text-gray-400 hover:text-gray-600">&larr; Back to home</a>
    </p>
  </div>
</div>
{% endblock %}
