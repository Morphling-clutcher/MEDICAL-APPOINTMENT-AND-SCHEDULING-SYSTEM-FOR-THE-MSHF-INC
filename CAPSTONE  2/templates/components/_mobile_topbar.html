{# Mobile-only top bar — shown below md:. The desktop page-title header stays untouched above md:. #}
<header class="md:hidden flex items-center justify-between gap-3 px-4 py-3 bg-white border-b border-slate-200 flex-shrink-0">
  <div class="flex items-center gap-2">
    <span class="flex size-8 shrink-0 items-center justify-center rounded-lg bg-brand-500 text-white">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
    </span>
    <span class="font-bold text-slate-900 text-base leading-tight">MSHFI</span>
  </div>
  <div class="flex items-center gap-1">
    <a href="/notifications/" aria-label="Notifications" class="relative flex size-10 items-center justify-center rounded-full text-slate-500 hover:bg-slate-100">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      {% if unread_notification_count > 0 %}
      <span class="absolute top-1 right-1 min-w-[16px] h-4 px-1 flex items-center justify-center rounded-full bg-red-500 text-white text-[10px] font-bold leading-none">{{ unread_notification_count }}</span>
      {% endif %}
    </a>
    <button type="button" onclick="toggleMobileDrawer()" aria-label="Open menu" aria-controls="mobile-drawer" class="flex size-10 items-center justify-center rounded-full text-slate-600 hover:bg-slate-100">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</header>
