{# My Profile / Sign Out links — identical across all 4 roles, shared by the desktop sidebar footer and the mobile drawer footer. #}
<a href="/accounts/profile/" class="group flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-blue-100 transition-all duration-200 hover:bg-white hover:text-brand-900">
  <svg class="w-5 h-5 shrink-0 text-blue-300 transition-colors duration-200 group-hover:text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
  My Profile
</a>
<form method="post" action="/accounts/logout/">
  {% csrf_token %}
  <button type="submit" class="group w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-left text-blue-100 transition-all duration-200 hover:bg-white hover:text-red-600">
    <svg class="w-5 h-5 shrink-0 text-blue-300 transition-colors duration-200 group-hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    Sign Out
  </button>
</form>
