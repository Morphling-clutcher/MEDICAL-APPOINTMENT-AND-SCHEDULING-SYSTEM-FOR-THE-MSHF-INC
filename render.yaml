databases:
  - name: mshfi-db
    plan: free

services:
  - type: web
    name: mshfi
    runtime: python
    plan: free
    rootDir: "CAPSTONE  2"
    buildCommand: bash build.sh
    startCommand: gunicorn mshfi.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mshfi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
